<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Inversa de Cobros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;
      // lucide is globally available but the structure might be different in UMD build
      // We access icons directly from lucide object in the component to be safe

      const firebaseConfig = {
        apiKey: "AIzaSyCxV_PLACEHOLDER_USER_NEEDS_TO_PROVIDE",
        authDomain: "calc-comisiones-fb.firebaseapp.com",
        projectId: "calc-comisiones-fb",
        storageBucket: "calc-comisiones-fb.appspot.com",
        messagingSenderId: "484196191637",
        appId: "1:484196191637:web:2c83a15a3a2c5a2c4d6f03",
      };

      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      const db = firebase.firestore();

      // --- Logic ---
      const calculatePrice = (netAmount, method) => {
        if (!netAmount) return 0;

        const base = parseFloat(method.comisionBase) || 0;
        const financ = parseFloat(method.comisionFinanc) || 0;

        // Logic:
        // Apply IVA separately if not included
        let baseConIVA = method.incluyeIVABase ? base : base * 1.21;
        let financConIVA = method.incluyeIVAFinanc ? financ : financ * 1.21;
        let effectiveCommission = baseConIVA + financConIVA;

        if (effectiveCommission >= 100) return 0; // Prevent division by zero or negative

        return netAmount / (1 - effectiveCommission / 100);
      };

      const formatCurrency = (amount) => {
        return new Intl.NumberFormat("es-AR", {
          style: "currency",
          currency: "ARS",
        }).format(amount);
      };

      // --- Initial Data ---
      const initialPaymentMethods = [
        {
          id: 1,
          medioCobro: "NAVE",
          medioPago: "Tarjeta de Crédito",
          cuotas: 1,
          banco: "Todos",
          comisionBase: 4.5,
          comisionFinanc: 0,
          incluyeIVABase: false,
          incluyeIVAFinanc: false,
          diasAcreditacion: 0,
          instrucciones: "Link de Pago NAVE",
          fecha_inicio: "",
          fecha_fin: "",
          dias_semana: [0, 1, 2, 3, 4, 5, 6],
          categoriaProducto: "",
          porcentaje_descuento_cliente: 0,
          tope_reintegro: 0,
          tipo_tope: "por_transaccion",
          fecha_ultima_edicion: new Date().toISOString(),
          esPromocion: false,
        },
        {
          id: 2,
          medioCobro: "PayWay",
          medioPago: "Tarjeta de Crédito",
          cuotas: 1,
          banco: "Todos",
          comisionBase: 1.97,
          comisionFinanc: 0,
          incluyeIVABase: false,
          incluyeIVAFinanc: false,
          diasAcreditacion: 0,
          instrucciones: "",
          fecha_inicio: "",
          fecha_fin: "",
          dias_semana: [0, 1, 2, 3, 4, 5, 6],
          categoriaProducto: "",
          porcentaje_descuento_cliente: 0,
          tope_reintegro: 0,
          tipo_tope: "por_transaccion",
          fecha_ultima_edicion: new Date().toISOString(),
          esPromocion: false,
        },
      ];

      // --- Components ---

      const LucideIcon = ({ name, size = 20, className = "" }) => {
        // Access global lucide object
        // In some UMD builds, it might be lucide.icons[name] or just lucide[name]
        // We check both
        const Icon =
          window.lucide &&
          (window.lucide.icons
            ? window.lucide.icons[name]
            : window.lucide[name]);

        if (!Icon) {
          console.warn(`Icon ${name} not found`);
          return <span className={className}>{name}</span>;
        }

        const iconRef = React.useRef(null);

        useEffect(() => {
          if (window.lucide && window.lucide.createIcons) {
            window.lucide.createIcons({
              root: iconRef.current?.parentElement || document,
              nameAttr: "data-lucide",
              attrs: {
                class: className,
                width: size,
                height: size,
              },
            });
          }
        }, [name, size, className]);

        return (
          <i
            ref={iconRef}
            data-lucide={name.toLowerCase()}
            className={className}
            style={{ width: size, height: size, display: "inline-block" }}
          ></i>
        );
      };

      const SelectOrInput = ({
        value,
        onChange,
        options,
        placeholder,
        required = true,
      }) => {
        const [isCustom, setIsCustom] = useState(false);
        const [customValue, setCustomValue] = useState("");

        useEffect(() => {
          // If the current value is not in the options list (and it's not empty), we are in custom mode
          if (value && !options.includes(value)) {
            setIsCustom(true);
            setCustomValue(value);
          } else {
            setIsCustom(false);
          }
        }, [value, options]);

        const handleSelectChange = (e) => {
          const val = e.target.value;
          if (val === "__NEW__") {
            setIsCustom(true);
            setCustomValue("");
            onChange("");
          } else {
            setIsCustom(false);
            onChange(val);
          }
        };

        const handleInputChange = (e) => {
          setCustomValue(e.target.value);
          onChange(e.target.value);
        };

        if (isCustom) {
          return (
            <div className="flex relative">
              <input
                type="text"
                required={required}
                placeholder={placeholder}
                value={customValue}
                onChange={handleInputChange}
                className="w-full p-2 pr-10 border rounded focus:ring-2 focus:ring-blue-500 outline-none"
              />
              <button
                type="button"
                onClick={() => {
                  setIsCustom(false);
                  onChange(options[0] || "");
                }}
                className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                title="Volver a la lista"
              >
                <LucideIcon name="XCircle" size={18} />
              </button>
            </div>
          );
        }

        return (
          <select
            required={required}
            value={value}
            onChange={handleSelectChange}
            className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none bg-white appearance-none"
          >
            {value === "" && (
              <option value="" disabled>
                Seleccionar...
              </option>
            )}
            {options.map((opt) => (
              <option key={opt} value={opt}>
                {opt}
              </option>
            ))}
            <option value="__NEW__" className="font-bold text-blue-600">
              ➕ Agregar nuevo...
            </option>
          </select>
        );
      };

      const Header = ({ currentView, onViewChange, role, onLogout }) => (
        <header className="flex justify-between items-center border-b bg-white py-4 px-4 sm:px-8 shadow-sm mb-6">
          <div className="overflow-x-auto w-full">
            <nav className="flex space-x-4 sm:space-x-8 min-w-max">
              <button
                onClick={() => onViewChange("calculator")}
                className={`flex items-center space-x-2 pb-2 px-2 text-base sm:text-lg font-medium transition-colors ${
                  currentView === "calculator"
                    ? "border-b-2 border-blue-600 text-blue-600"
                    : "text-gray-500 hover:text-gray-700"
                }`}
              >
                <LucideIcon name="Calculator" size={20} />
                <span>Calculadora</span>
              </button>
              <button
                onClick={() => onViewChange("promotions")}
                className={`flex items-center space-x-2 pb-2 px-2 text-base sm:text-lg font-medium transition-colors ${
                  currentView === "promotions"
                    ? "border-b-2 border-purple-600 text-purple-600"
                    : "text-gray-500 hover:text-gray-700"
                }`}
              >
                <LucideIcon name="Gift" size={20} />

              </button>
              <button
                onClick={() => onViewChange("notifications")}

                  currentView === "notifications"
                    ? "border-b-2 border-orange-500 text-orange-500"
                    : "text-gray-500 hover:text-gray-700"
                }`}
              >
                <LucideIcon name="Bell" size={20} />
                <span>Novedades</span>
              </button>

              {["marketing", "admin"].includes(role) && (
                <button
                  onClick={() => onViewChange("marketing")}
                  className={`flex items-center space-x-2 pb-2 px-2 text-base sm:text-lg font-medium transition-colors ${
                    currentView === "marketing"
                      ? "border-b-2 border-pink-500 text-pink-500"
                      : "text-gray-500 hover:text-gray-700"
                  }`}
                >
                  <LucideIcon name="Megaphone" size={20} />
                  <span>Marketing</span>
                </button>
              )}

              <button
                onClick={() => onViewChange("manual")}
                className={`flex items-center space-x-2 pb-2 px-2 text-base sm:text-lg font-medium transition-colors ${
                  currentView === "manual"
                    ? "border-b-2 border-indigo-600 text-indigo-600"
                    : "text-gray-500 hover:text-gray-700"
                }`}
              >
                <LucideIcon name="Book" size={20} />
                <span>Manual</span>
              </button>

              {role === "admin" && (
                <button
                  onClick={() => onViewChange("config")}
                  className={`flex items-center space-x-2 pb-2 px-2 text-base sm:text-lg font-medium transition-colors ${
                    currentView === "config"
                      ? "border-b-2 border-gray-800 text-gray-800"
                      : "text-gray-500 hover:text-gray-700"
                  }`}
                >
                  <LucideIcon name="Settings" size={20} />
                  <span>Configuración</span>
                </button>
              )}
            </nav>
          </div>

          <div className="flex items-center gap-3 ml-4 pl-4 border-l border-gray-200">
            <div className="hidden sm:flex flex-col text-right">
              <span className="text-xs text-gray-500">Sesión</span>
              <span className="text-sm font-bold text-gray-800 capitalize">
                {role === "seller" ? "Vendedor" : role}
              </span>
            </div>
            <button
              onClick={onLogout}
              title="Cerrar sesión"
              className="p-2 text-gray-500 hover:text-red-600 bg-gray-50 hover:bg-red-50 rounded-full transition-colors flex items-center justify-center"
            >
              <LucideIcon name="LogOut" size={18} />
            </button>
          </div>
        </header>
      );

      const ResultCard = ({
        method,
        price,
        effectiveCommission,
        isBestOverall,
        alternatives = [],
      }) => {
        const [showAlternatives, setShowAlternatives] = useState(false);
        const [showInstructions, setShowInstructions] = useState(false);

        // Determine border and background based on highlight type
        let cardClass =
          "relative p-5 rounded-lg border transition-shadow hover:shadow-md bg-white flex flex-col h-full";
        let badgeClass = "";
        let badgeText = "";
        let badgeIcon = null;

        if (isBestOverall) {
          cardClass += " border-green-500 bg-green-50/50";
          badgeClass = "bg-green-100 text-green-700 border-green-300";
          badgeText = "Opción más barata";
          badgeIcon = (
            <LucideIcon name="DollarSign" size={12} className="mr-1" />
          );
        } else if (method.esPromocion) {
          cardClass += " border-blue-400 bg-blue-50/30";
          badgeClass = "bg-blue-100 text-blue-700 border-blue-200";
          badgeText = "Promo Activa";
          badgeIcon = <LucideIcon name="Gift" size={12} className="mr-1" />;
        } else if (method.cuotas > 1) {
          cardClass += " border-orange-300 bg-orange-50/30";
          badgeClass = "bg-orange-100 text-orange-700 border-orange-200";
          badgeText = "Cuotas";
          badgeIcon = (
            <LucideIcon name="CreditCard" size={12} className="mr-1" />
          );
        } else {
          cardClass += " border-gray-200";
        }

        const diasSemanaNombres = [
          "Dom",
          "Lun",
          "Mar",
          "Mié",
          "Jue",
          "Vie",
          "Sáb",
        ];

        return (
          <div className={cardClass}>
            {badgeText && (
              <span
                className={`absolute top-2 right-2 px-2 py-0.5 text-xs font-bold rounded-full border flex items-center ${badgeClass}`}
              >
                {badgeIcon}
                {badgeText}
              </span>
            )}
            <h3 className="font-bold text-gray-900 text-lg mb-1 flex flex-col sm:flex-row sm:items-center pr-24">
              {method.medioCobro}
              <span className="text-sm font-normal text-gray-500 sm:ml-2">
                ({method.medioPago})
              </span>
            </h3>
            <div className="text-sm font-medium text-gray-600 mb-1">
              {method.banco !== "Todos" ? method.banco : "Todos los bancos"}
            </div>

            <div className="mt-2 mb-3 bg-gray-50 p-3 rounded-md border border-gray-100">
              <div className="text-xs text-gray-500 mb-0.5">
                Monto final a cobrar
              </div>
              <div className="text-3xl font-bold text-gray-900">
                {price > 0 ? formatCurrency(price) : "$0.00"}
              </div>
              <div className="text-xs text-gray-500 mt-1 flex items-center gap-1">
                <LucideIcon name="Percent" size={12} />
                Comisión aplicada:{" "}
                <span className="font-semibold text-gray-700">
                  {effectiveCommission.toFixed(2)}%
                </span>
              </div>
            </div>

            {method.esPromocion && (
              <div className="mb-3 p-2.5 bg-blue-50/80 border border-blue-100 rounded text-sm text-blue-900 flex flex-col gap-1.5">
                <div className="flex items-start gap-2">
                  <LucideIcon
                    name="BadgePercent"
                    size={16}
                    className="text-blue-600 mt-0.5 flex-shrink-0"
                  />
                  <div>
                    <span className="font-bold">
                      {method.porcentaje_descuento_cliente > 0
                        ? `${method.porcentaje_descuento_cliente}% OFF`
                        : "Promoción especial"}
                    </span>
                    {method.tope_reintegro > 0 && (
                      <span className="text-blue-700 ml-1">
                        (Tope: ${method.tope_reintegro})
                      </span>
                    )}
                  </div>
                </div>
                <div className="flex items-center gap-2 text-xs text-blue-700 ml-6">
                  <LucideIcon
                    name="CalendarDays"
                    size={12}
                    className="opacity-70"
                  />
                  {method.dias_semana.length < 7
                    ? `Días: ${method.dias_semana.map((d) => diasSemanaNombres[d]).join(", ")}`
                    : "Todos los días"}
                  {method.banco !== "Todos" && (
                    <span className="ml-2 font-semibold">· {method.banco}</span>
                  )}
                </div>
              </div>
            )}

            <div className="space-y-1.5 mt-auto text-sm text-gray-600">
              <div className="flex items-center gap-2">
                <LucideIcon
                  name="Calendar"
                  size={14}
                  className="text-gray-400"
                />
                <span>
                  Acreditación:{" "}
                  <span className="font-medium text-gray-800">
                    {method.diasAcreditacion} días
                  </span>
                </span>
              </div>
              <div className="flex items-center gap-2">
                <LucideIcon
                  name="CreditCard"
                  size={14}
                  className="text-gray-400"
                />
                <span>
                  Cuotas:{" "}
                  <span className="font-medium text-gray-800">
                    {method.cuotas}
                  </span>
                </span>
              </div>
            </div>

            {method.instrucciones && (
              <div className="mt-3">
                <button
                  onClick={() => setShowInstructions(!showInstructions)}
                  className="text-xs font-medium text-blue-600 hover:text-blue-800 flex items-center gap-1 transition-colors"
                >
                  {showInstructions
                    ? "Ocultar instrucciones"
                    : "Ver instrucciones"}
                  <LucideIcon
                    name={showInstructions ? "ChevronUp" : "ChevronDown"}
                    size={14}
                  />
                </button>
                {showInstructions && (
                  <div className="mt-2 p-2.5 bg-gray-50 border border-gray-200 rounded text-xs text-gray-700 italic">
                    {method.instrucciones}
                  </div>
                )}
              </div>
            )}

            {alternatives.length > 0 && (
              <div className="mt-4 pt-3 border-t border-gray-100 flex flex-col items-center">
                {alternatives.some(
                  (alt) =>
                    alt.method.esPromocion ||
                    alt.method.porcentaje_descuento_cliente > 0,
                ) &&
                  !showAlternatives && (
                    <div className="w-full mb-2 p-2 bg-blue-50/50 border border-blue-100 rounded text-xs text-blue-800 flex items-center justify-between">
                      <div className="flex items-center gap-1.5 font-medium">
                        <LucideIcon
                          name="Tag"
                          size={14}
                          className="text-blue-600"
                        />
                        ¡Hay promociones en otras opciones!
                      </div>
                      <span className="text-blue-600 font-bold">
                        {alternatives
                          .filter(
                            (alt) =>
                              alt.method.esPromocion ||
                              alt.method.porcentaje_descuento_cliente > 0,
                          )
                          .map((a) => a.method.banco)
                          .filter(
                            (v, i, a) => a.indexOf(v) === i && v !== "Todos",
                          )
                          .join(", ")}
                      </span>
                    </div>
                  )}
                <button
                  onClick={() => setShowAlternatives(!showAlternatives)}
                  className="text-sm font-medium text-gray-500 hover:text-blue-600 transition-colors flex items-center gap-1 w-full justify-center py-1"
                >
                  {showAlternatives ? (
                    <>
                      Ocultar opciones <LucideIcon name="ChevronUp" size={16} />
                    </>
                  ) : (
                    <>
                      Ver {alternatives.length}{" "}
                      {alternatives.length === 1 ? "opción" : "opciones"} más{" "}
                      <LucideIcon name="ChevronDown" size={16} />
                    </>
                  )}
                </button>

                {showAlternatives && (
                  <div className="w-full mt-3 space-y-3">
                    {alternatives.map((alt) => (
                      <div
                        key={alt.method.id}
                        className="bg-gray-50 rounded-lg p-3 border border-gray-200 text-sm"
                      >
                        <div className="flex justify-between items-start mb-1">
                          <span className="font-bold text-gray-800">
                            {alt.method.medioCobro}
                          </span>
                          <span className="font-bold text-gray-900">
                            {formatCurrency(alt.price)}
                          </span>
                        </div>
                        <div className="text-gray-500 text-xs mb-2">
                          {alt.method.banco !== "Todos"
                            ? alt.method.banco
                            : "Todos los bancos"}
                        </div>

                        {alt.method.porcentaje_descuento_cliente > 0 && (
                          <div className="mb-2 p-1.5 bg-blue-50/50 border border-blue-100 rounded text-xs text-blue-800 flex items-start gap-1">
                            <LucideIcon
                              name="Tag"
                              size={12}
                              className="text-blue-600 mt-0.5 flex-shrink-0"
                            />
                            <span>
                              <span className="font-bold">
                                {alt.method.porcentaje_descuento_cliente}% OFF
                              </span>
                              {alt.method.tope_reintegro > 0 &&
                                ` (Tope: $${alt.method.tope_reintegro})`}
                            </span>
                          </div>
                        )}

                        <div className="grid grid-cols-2 gap-1 text-xs text-gray-600">
                          <div className="flex items-center gap-1">
                            <LucideIcon
                              name="Calendar"
                              size={12}
                              className="text-gray-400"
                            />
                            {alt.method.diasAcreditacion} días
                          </div>
                          <div className="flex items-center gap-1">
                            <LucideIcon
                              name="Percent"
                              size={12}
                              className="text-gray-400"
                            />
                            {alt.effectiveCommission.toFixed(2)}%
                          </div>
                        </div>
                        {alt.method.instrucciones && (
                          <div className="mt-2 text-xs text-gray-500 italic">
                            {alt.method.instrucciones}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      };

      const CalculatorView = ({ methods }) => {
        const [precioBase, setPrecioBase] = useState("");
        const [porcentajeInflado, setPorcentajeInflado] = useState("");

        const [selectedBank, setSelectedBank] = useState("Todos");
        const [isFlexible, setIsFlexible] = useState(false);
        const [selectedCuota, setSelectedCuota] = useState("Todas");
        const [onlyPromosToday, setOnlyPromosToday] = useState(false);
        const [onlyInstallments, setOnlyInstallments] = useState(false);
        const [copied, setCopied] = useState(false);

        const montoNeto = useMemo(() => {
          const base = parseFloat(precioBase) || 0;
          const inflado = parseFloat(porcentajeInflado) || 0;
          if (base <= 0) return 0;
          return base * (1 - inflado / 100);
        }, [precioBase, porcentajeInflado]);

        // Get unique banks
        const banks = useMemo(() => {
          const allBanks = methods.map((m) => m.banco || "Todos");
          return ["Todos", ...new Set(allBanks.filter((b) => b !== "Todos"))];
        }, [methods]);

        const uniqueCuotas = useMemo(() => {
          const cuotas = methods.map((m) => m.cuotas);
          return ["Todas", ...new Set(cuotas)].sort((a, b) => {
            if (a === "Todas") return -1;
            if (b === "Todas") return 1;
            return a - b;
          });
        }, [methods]);

        // Group and calculate results
        const resultsByInstallments = useMemo(() => {
          if (!montoNeto) return {};

          const netAmount = montoNeto;

          const today = new Date();
          const todayStr = today.toISOString().split("T")[0];
          const currentDayOfWeek = today.getDay(); // 0 (Sun) to 6 (Sat)

          // Future dates for flexible search (next 7 days)
          const flexibleDates = [];
          for (let i = 0; i <= 7; i++) {
            const d = new Date(today);
            d.setDate(today.getDate() + i);
            flexibleDates.push({
              dateStr: d.toISOString().split("T")[0],
              dayOfWeek: d.getDay(),
            });
          }

          // Filter methods
          const filteredMethods = methods.filter((m) => {
            // 1. Bank filter
            if (
              selectedBank !== "Todos" &&
              m.banco !== "Todos" &&
              m.banco !== selectedBank
            ) {
              return false;
            }

            // 2. Cuotas filter
            if (
              selectedCuota !== "Todas" &&
              m.cuotas.toString() !== selectedCuota.toString()
            ) {
              return false;
            }

            // 3. Date & Vigency filter
            if (isFlexible) {
              // For flexible: Must be valid on at least ONE of the next 7 days
              const validInFuture = flexibleDates.some((fd) => {
                const validDate =
                  (!m.fecha_inicio || m.fecha_inicio <= fd.dateStr) &&
                  (!m.fecha_fin || m.fecha_fin >= fd.dateStr);
                const validDay = m.dias_semana.includes(fd.dayOfWeek);
                return validDate && validDay;
              });
              if (!validInFuture) return false;
            } else {
              // For today: Must be valid strictly today
              const validDate =
                (!m.fecha_inicio || m.fecha_inicio <= todayStr) &&
                (!m.fecha_fin || m.fecha_fin >= todayStr);
              const validDay = m.dias_semana.includes(currentDayOfWeek);
              if (!validDate || !validDay) return false;
            }

            // 4. "Solo promos activas hoy"
            if (onlyPromosToday) {
              if (!m.esPromocion) return false;
              // Even if flexible is on, this checkbox explicitly overrides to "active today"
              const validDate =
                (!m.fecha_inicio || m.fecha_inicio <= todayStr) &&
                (!m.fecha_fin || m.fecha_fin >= todayStr);
              const validDay = m.dias_semana.includes(currentDayOfWeek);
              if (!validDate || !validDay) return false;
            }

            // 5. "Solo cuotas"
            if (onlyInstallments) {
              if (m.cuotas <= 1) return false;
            }

            return true;
          });

          const groupedByCuota = {};
          let overallBestPrice = Infinity;

          filteredMethods.forEach((method) => {
            const price = calculatePrice(netAmount, method);

            // Calculate Effective Commission strictly for display
            const base = parseFloat(method.comisionBase) || 0;
            const financ = parseFloat(method.comisionFinanc) || 0;
            let baseConIVA = method.incluyeIVABase ? base : base * 1.21;
            let financConIVA = method.incluyeIVAFinanc ? financ : financ * 1.21;
            let effectiveCommission = baseConIVA + financConIVA;

            if (price > 0 && price < overallBestPrice) {
              overallBestPrice = price;
            }

            if (!groupedByCuota[method.cuotas]) {
              groupedByCuota[method.cuotas] = [];
            }
            groupedByCuota[method.cuotas].push({
              method,
              price,
              effectiveCommission,
            });
          });

          // Restructure groups to have one "best" per medioPago and the rest as alternatives
          const finalGrouped = {};

          Object.keys(groupedByCuota).forEach((cuota) => {
            const itemsInCuota = groupedByCuota[cuota];
            // Group by medioPago within the cuota
            const byMedioPago = {};
            itemsInCuota.forEach((item) => {
              const category = item.method.medioPago;
              if (!byMedioPago[category]) byMedioPago[category] = [];
              byMedioPago[category].push(item);
            });

            // For each medioPago, sort by price. First is best, rest are alternatives.
            const categoriesForCuota = [];
            Object.keys(byMedioPago).forEach((category) => {
              const items = byMedioPago[category];
              items.sort((a, b) => a.price - b.price);

              const bestOption = items[0];
              const alternatives = items.slice(1);

              categoriesForCuota.push({
                category,
                bestOption,
                alternatives,
              });
            });

            // Sort categories by the best option's price so the cheapest overall appears first
            categoriesForCuota.sort(
              (a, b) => a.bestOption.price - b.bestOption.price,
            );

            // Mark badges on the bestOption of each category
            categoriesForCuota.forEach((catGroup, idx) => {
              const item = catGroup.bestOption;
              item.isBestOverall =
                Math.abs(item.price - overallBestPrice) < 0.01;
              // Every top-level card is the best in its category, so we mark it if it's not the absolute best
              item.isBestInCategory = !item.isBestOverall;
            });

            finalGrouped[cuota] = categoriesForCuota;
          });

          // Flatten into a single array, sorted by cuotas, then by price
          const flattenedResults = [];
          Object.keys(finalGrouped)
            .sort((a, b) => Number(a) - Number(b))
            .forEach((cuota) => {
              finalGrouped[cuota].forEach((catGroup) => {
                flattenedResults.push(catGroup);
              });
            });

          return { flattenedResults, finalGrouped };
        }, [
          montoNeto,
          methods,
          selectedBank,
          selectedCuota,
          isFlexible,
          onlyPromosToday,
          onlyInstallments,
        ]);

        const handleCopyOptions = () => {
          if (
            !resultsByInstallments.flattenedResults ||
            resultsByInstallments.flattenedResults.length === 0
          )
            return;

          const normalOptions = [];
          const promoOptions = [];

          const diasSemanaNombres = [
            "Dom",
            "Lun",
            "Mar",
            "Mié",
            "Jue",
            "Vie",
            "Sáb",
          ];

          // Collect and separate options
          resultsByInstallments.flattenedResults.forEach((catGroup) => {
            const allOptionsForCat = [
              catGroup.bestOption,
              ...catGroup.alternatives,
            ];

            // Extract the best generic option
            const bestNormal = allOptionsForCat.find(
              (alt) =>
                alt.method.banco === "Todos" &&
                !alt.method.esPromocion &&
                alt.method.porcentaje_descuento_cliente === 0,
            );
            if (bestNormal) {
              normalOptions.push(bestNormal);
            } else if (catGroup.bestOption.method.banco === "Todos") {
              // Fallback
              normalOptions.push(catGroup.bestOption);
            }

            // Extract promotional options
            const promos = allOptionsForCat.filter(
              (alt) =>
                alt.method.esPromocion ||
                alt.method.porcentaje_descuento_cliente > 0 ||
                alt.method.banco !== "Todos",
            );
            promoOptions.push(...promos);
          });

          let textToCopy = `*Opciones de Pago*\n\n`;

          // Format normal options
          normalOptions.forEach((item) => {
            const method = item.method;
            textToCopy += `💳 *${method.medioCobro}* - ${method.medioPago}\n`;
            textToCopy += `Total: ${formatCurrency(item.price)}\n`;

            if (method.cuotas > 1) {
              const cuotaAmount = item.price / method.cuotas;
              textToCopy += `👉 ${method.cuotas} cuotas de ${formatCurrency(cuotaAmount)}\n`;
            }
            textToCopy += `\n`;
          });

          // Format promotional options at the end
          if (promoOptions.length > 0) {
            textToCopy += `🎁 *Promociones*\n\n`;

            promoOptions.forEach((item) => {
              const method = item.method;
              textToCopy += `💳 *${method.medioCobro}* (${method.banco}) - ${method.medioPago}\n`;
              textToCopy += `Total: ${formatCurrency(item.price)}\n`;

              if (method.cuotas > 1) {
                const cuotaAmount = item.price / method.cuotas;
                textToCopy += `👉 ${method.cuotas} cuotas de ${formatCurrency(cuotaAmount)}\n`;
              }

              if (method.porcentaje_descuento_cliente > 0) {
                textToCopy += `🏷️ ${method.porcentaje_descuento_cliente}% OFF `;
                if (method.tope_reintegro > 0) {
                  textToCopy += `(Tope reintegro: $${method.tope_reintegro}) `;
                }
                textToCopy += `\n`;
              }

              if (method.dias_semana.length < 7) {
                textToCopy += `📅 Días: ${method.dias_semana.map((d) => diasSemanaNombres[d]).join(", ")}\n`;
              }
              if (method.fecha_fin) {
                // Adjusting for timezone to not show the wrong date
                const d = new Date(method.fecha_fin);
                d.setMinutes(d.getMinutes() + d.getTimezoneOffset());
                textToCopy += `⏳ Hasta: ${d.toLocaleDateString("es-AR")}\n`;
              }

              textToCopy += `\n`;
            });
          }

          navigator.clipboard
            .writeText(textToCopy.trim())
            .then(() => {
              setCopied(true);
              setTimeout(() => setCopied(false), 2000);
            })
            .catch((err) => {
              console.error("Failed to copy text: ", err);
            });
        };

        return (
          <div className="max-w-4xl mx-auto p-4">
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                <h2 className="text-2xl font-bold text-gray-800">
                  Calculadora de Precio de Venta
                </h2>
                <div className="flex items-center space-x-2 bg-gray-100 p-1 rounded-lg">
                  <button
                    onClick={() => setIsFlexible(false)}
                    className={`px-3 py-1.5 text-sm font-medium rounded-md transition-all ${!isFlexible ? "bg-white shadow text-blue-600" : "text-gray-500 hover:text-gray-700"}`}
                  >
                    Solo Hoy
                  </button>
                  <button
                    onClick={() => setIsFlexible(true)}
                    className={`px-3 py-1.5 text-sm font-medium rounded-md transition-all ${isFlexible ? "bg-white shadow text-blue-600" : "text-gray-500 hover:text-gray-700"}`}
                  >
                    Flexible (7 días)
                  </button>
                </div>
              </div>

              <div className="mb-6 flex flex-wrap gap-4 items-center bg-blue-50/50 p-3 rounded-lg border border-blue-100">
                <label className="flex items-center space-x-2 cursor-pointer">
                  <input
                    type="checkbox"
                    checked={onlyPromosToday}
                    onChange={(e) => setOnlyPromosToday(e.target.checked)}
                    className="w-4 h-4 text-blue-600 rounded border-blue-300 focus:ring-blue-500"
                  />
                  <span className="text-sm font-medium text-blue-800">
                    Solo promos activas hoy
                  </span>
                </label>
                <label className="flex items-center space-x-2 cursor-pointer">
                  <input
                    type="checkbox"
                    checked={onlyInstallments}
                    onChange={(e) => setOnlyInstallments(e.target.checked)}
                    className="w-4 h-4 text-orange-500 rounded border-orange-300 focus:ring-orange-500"
                  />
                  <span className="text-sm font-medium text-orange-800">
                    Solo cuotas (+1)
                  </span>
                </label>
              </div>

              <div className="mb-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">
                      Precio de Lista / Venta
                    </label>
                    <div className="relative">
                      <span className="absolute left-3 top-3 text-gray-400">
                        $
                      </span>
                      <input
                        type="number"
                        value={precioBase}
                        onChange={(e) => setPrecioBase(e.target.value)}
                        placeholder="Ej: 15000"
                        className="w-full pl-8 pr-4 py-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none text-lg"
                      />
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">
                      % Inflado (Descuento efvo)
                    </label>
                    <div className="relative">
                      <input
                        type="number"
                        value={porcentajeInflado}
                        onChange={(e) => setPorcentajeInflado(e.target.value)}
                        placeholder="Ej: 20"
                        className="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none text-lg"
                      />
                      <span className="absolute right-4 top-3 text-gray-400">
                        %
                      </span>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">
                      Precio Contado (Monto Neto)
                    </label>
                    <div className="w-full px-4 py-3 bg-gray-200 border border-gray-300 rounded-lg text-lg font-bold text-gray-800 flex items-center justify-between">
                      <span>$</span>
                      <span>
                        {montoNeto > 0
                          ? montoNeto.toLocaleString("es-AR", {
                              minimumFractionDigits: 2,
                              maximumFractionDigits: 2,
                            })
                          : "0,00"}
                      </span>
                    </div>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">
                    Cuotas
                  </label>
                  <select
                    value={selectedCuota}
                    onChange={(e) => setSelectedCuota(e.target.value)}
                    className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none text-lg appearance-none"
                  >
                    {uniqueCuotas.map((cuota) => (
                      <option key={cuota} value={cuota}>
                        {cuota === "Todas"
                          ? "Todas las cuotas"
                          : `${cuota} cuota(s)`}
                      </option>
                    ))}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">
                    Banco del Cliente
                  </label>
                  <select
                    value={selectedBank}
                    onChange={(e) => setSelectedBank(e.target.value)}
                    className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none text-lg appearance-none"
                  >
                    {banks.map((bank) => (
                      <option key={bank} value={bank}>
                        {bank}
                      </option>
                    ))}
                  </select>
                </div>
              </div>
            </div>

            {montoNeto > 0 &&
              resultsByInstallments.flattenedResults &&
              resultsByInstallments.flattenedResults.length > 0 && (
                <div className="flex justify-end mb-4">
                  <button
                    onClick={handleCopyOptions}
                    className={`flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg transition-colors ${
                      copied
                        ? "bg-green-100 text-green-700 border border-green-300"
                        : "bg-blue-600 hover:bg-blue-700 text-white shadow-sm"
                    }`}
                  >
                    {copied ? (
                      <>
                        <LucideIcon name="Check" size={16} />
                        Copiado al portapapeles
                      </>
                    ) : (
                      <>
                        <LucideIcon name="Copy" size={16} />
                        Copiar opciones
                      </>
                    )}
                  </button>
                </div>
              )}

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 items-stretch">
              {montoNeto > 0 &&
                resultsByInstallments.flattenedResults &&
                resultsByInstallments.flattenedResults.length > 0 &&
                resultsByInstallments.flattenedResults.map((catGroup, idx) => {
                  const item = catGroup.bestOption;
                  return (
                    <ResultCard
                      key={`${item.method.id}-${item.method.cuotas}`}
                      method={item.method}
                      price={item.price}
                      effectiveCommission={item.effectiveCommission}
                      isBestOverall={item.isBestOverall}
                      alternatives={catGroup.alternatives}
                    />
                  );
                })}
            </div>

            {montoNeto > 0 &&
              resultsByInstallments.flattenedResults &&
              resultsByInstallments.flattenedResults.length === 0 && (
                <div className="text-center text-gray-500 py-10 border-2 border-dashed border-gray-200 rounded-xl bg-white mt-4">
                  No se encontraron opciones para este filtro.
                </div>
              )}
          </div>
        );
      };

      const ConfigView = ({
        methods,
        deletedMethods,
        onAdd,
        onBulkAdd,
        onEdit,
        onDelete,
        onRestore,
        onHardDelete,
        onPull,
        onPush,
        onExport,
      }) => {
        const [editingId, setEditingId] = useState(null);
        const [showTrash, setShowTrash] = useState(false);
        const [bulkInput, setBulkInput] = useState("");
        const [bulkError, setBulkError] = useState("");
        const [bulkSuccess, setBulkSuccess] = useState("");

        const [formData, setFormData] = useState({
          medioCobro: "",
          medioPago: "",
          cuotas: 1,
          banco: "Todos",
          comisionBase: 0,
          comisionFinanc: 0,
          incluyeIVABase: false,
          incluyeIVAFinanc: false,
          diasAcreditacion: 0,
          instrucciones: "",
          fecha_inicio: "",
          fecha_fin: "",
          dias_semana: [0, 1, 2, 3, 4, 5, 6],
          categoriaProducto: "",
          porcentaje_descuento_cliente: 0,
          tope_reintegro: 0,
          tipo_tope: "por_transaccion",
          esPromocion: false,
        });

        const resetForm = () => {
          setFormData({
            medioCobro: "",
            medioPago: "",
            cuotas: 1,
            banco: "Todos",
            comisionBase: 0,
            comisionFinanc: 0,
            incluyeIVABase: false,
            incluyeIVAFinanc: false,
            diasAcreditacion: 0,
            instrucciones: "",
            fecha_inicio: "",
            fecha_fin: "",
            dias_semana: [0, 1, 2, 3, 4, 5, 6],
            categoriaProducto: "",
            porcentaje_descuento_cliente: 0,
            tope_reintegro: 0,
            tipo_tope: "por_transaccion",
            esPromocion: false,
          });
          setEditingId(null);
        };

        const toggleDia = (diaIndex) => {
          setFormData((prev) => {
            const dias = prev.dias_semana.includes(diaIndex)
              ? prev.dias_semana.filter((d) => d !== diaIndex)
              : [...prev.dias_semana, diaIndex];
            return { ...prev, dias_semana: dias.sort() };
          });
        };

        const diasSemanaNombres = [
          "Dom",
          "Lun",
          "Mar",
          "Mié",
          "Jue",
          "Vie",
          "Sáb",
        ];

        const getVigencyStatus = (method) => {
          const todayStr = new Date().toISOString().split("T")[0];
          const inicio = method.fecha_inicio;
          const fin = method.fecha_fin;

          if (fin && todayStr > fin) {
            return {
              label: "Expirado",
              color: "bg-red-100 text-red-800 border-red-200",
            };
          }

          if (fin) {
            const msPerDay = 1000 * 60 * 60 * 24;
            const todayDate = new Date(todayStr);
            const finDate = new Date(fin);
            const diffDays = Math.ceil((finDate - todayDate) / msPerDay);
            if (diffDays <= 3 && diffDays >= 0) {
              return {
                label: "Próximo a vencer",
                color: "bg-yellow-100 text-yellow-800 border-yellow-200",
              };
            }
          }

          if (inicio && todayStr < inicio) {
            return {
              label: "Programado",
              color: "bg-blue-100 text-blue-800 border-blue-200",
            };
          }

          return {
            label: "Vigente",
            color: "bg-green-100 text-green-800 border-green-200",
          };
        };

        // Aggregate existing options + defaults
        const uniqueOptions = useMemo(() => {
          const defaults = {
            mediosCobro: [
              "NAVE",
              "PayWay",
              "Mercado Pago",
              "Viumi",
              "Getnet",
              "Ualá Bis",
            ],
            mediosPago: [
              "Tarjeta de Crédito",
              "Tarjeta de Débito",
              "Dinero en cuenta",
              "Transferencia",
              "QR",
            ],
            bancos: [
              "Todos",
              "Galicia",
              "Santander",
              "BBVA",
              "Macro",
              "ICBC",
              "Nación",
              "Provincia",
              "Ciudad",
              "Patagonia",
              "Comafi",
            ],
          };

          methods.forEach((m) => {
            if (m.medioCobro && !defaults.mediosCobro.includes(m.medioCobro))
              defaults.mediosCobro.push(m.medioCobro);
            if (m.medioPago && !defaults.mediosPago.includes(m.medioPago))
              defaults.mediosPago.push(m.medioPago);
            if (m.banco && !defaults.bancos.includes(m.banco))
              defaults.bancos.push(m.banco);
          });

          return {
            mediosCobro: defaults.mediosCobro.sort(),
            mediosPago: defaults.mediosPago.sort(),
            bancos: defaults.bancos.sort(),
          };
        }, [methods]);

        const handleBulkSubmit = () => {
          setBulkError("");
          setBulkSuccess("");

          if (!bulkInput.trim()) {
            setBulkError("Por favor, ingresá los datos en formato JSON.");
            return;
          }

          try {
            const parsedData = JSON.parse(bulkInput);

            if (!Array.isArray(parsedData)) {
              throw new Error(
                "El archivo JSON debe contener un arreglo de objetos (empezar con [ y terminar con ]).",
              );
            }

            if (parsedData.length === 0) {
              throw new Error("El arreglo JSON está vacío.");
            }

            const validMethods = [];
            let currentTimestamp = Date.now();

            for (let i = 0; i < parsedData.length; i++) {
              const item = parsedData[i];

              if (!item.medioCobro || typeof item.medioCobro !== "string") {
                throw new Error(
                  `Fila ${i + 1}: El campo 'medioCobro' es obligatorio y debe ser texto.`,
                );
              }
              if (!item.medioPago || typeof item.medioPago !== "string") {
                throw new Error(
                  `Fila ${i + 1}: El campo 'medioPago' es obligatorio y debe ser texto.`,
                );
              }
              if (!item.banco || typeof item.banco !== "string") {
                throw new Error(
                  `Fila ${i + 1}: El campo 'banco' es obligatorio y debe ser texto.`,
                );
              }
              if (
                item.cuotas === undefined ||
                typeof item.cuotas !== "number" ||
                item.cuotas < 1
              ) {
                throw new Error(
                  `Fila ${i + 1}: El campo 'cuotas' es obligatorio y debe ser un número mayor o igual a 1.`,
                );
              }
              if (
                item.comisionBase === undefined ||
                typeof item.comisionBase !== "number"
              ) {
                throw new Error(
                  `Fila ${i + 1}: El campo 'comisionBase' es obligatorio y debe ser un número.`,
                );
              }
              if (
                item.comisionFinanc === undefined ||
                typeof item.comisionFinanc !== "number"
              ) {
                throw new Error(
                  `Fila ${i + 1}: El campo 'comisionFinanc' es obligatorio y debe ser un número.`,
                );
              }
              if (
                item.dias_semana !== undefined &&
                (!Array.isArray(item.dias_semana) ||
                  item.dias_semana.some(
                    (d) => typeof d !== "number" || d < 0 || d > 6,
                  ))
              ) {
                throw new Error(
                  `Fila ${i + 1}: El campo 'dias_semana' debe ser un arreglo de números del 0 al 6.`,
                );
              }
              if (
                item.esPromocion !== undefined &&
                typeof item.esPromocion !== "boolean"
              ) {
                throw new Error(
                  `Fila ${i + 1}: El campo 'esPromocion' debe ser un valor booleano (true/false).`,
                );
              }

              // Apply defaults and structure
              validMethods.push({
                id: currentTimestamp + i,
                medioCobro: item.medioCobro,
                medioPago: item.medioPago,
                cuotas: item.cuotas,
                banco: item.banco,
                comisionBase: item.comisionBase,
                comisionFinanc: item.comisionFinanc,
                incluyeIVABase: !!item.incluyeIVABase,
                incluyeIVAFinanc: !!item.incluyeIVAFinanc,
                diasAcreditacion:
                  typeof item.diasAcreditacion === "number"
                    ? item.diasAcreditacion
                    : 0,
                instrucciones: item.instrucciones || "",
                fecha_inicio: item.fecha_inicio || "",
                fecha_fin: item.fecha_fin || "",
                dias_semana: item.dias_semana || [0, 1, 2, 3, 4, 5, 6],
                categoriaProducto: item.categoriaProducto || "",
                porcentaje_descuento_cliente:
                  typeof item.porcentaje_descuento_cliente === "number"
                    ? item.porcentaje_descuento_cliente
                    : 0,
                tope_reintegro:
                  typeof item.tope_reintegro === "number"
                    ? item.tope_reintegro
                    : 0,
                tipo_tope: item.tipo_tope || "por_transaccion",
                fecha_ultima_edicion: new Date().toISOString(),
                esPromocion: !!item.esPromocion,
                marketingNotes: item.marketingNotes || "",
                marketingImages: item.marketingImages || [],
              });
            }

            onBulkAdd(validMethods);
            setBulkSuccess(
              `¡Carga masiva exitosa! Se importaron ${validMethods.length} medios de cobro.`,
            );
            setBulkInput("");

            setTimeout(() => {
              setBulkSuccess("");
            }, 5000);
          } catch (error) {

          reader.onerror = () => {

          e.target.value = null;

          if (promo.fecha_inicio && promo.fecha_inicio > todayStr) {
            return "upcoming";
          }
          if (promo.fecha_fin && promo.fecha_fin < todayStr) {
            return "expired";
          }
          return "active";
        };

        // Filter valid promotions
        const filteredPromotions = useMemo(() => {
          return methods.filter((m) => {
            if (!m.esPromocion) return false;

            const status = getPromoStatus(m);
            if (status === "expired") return false;

            if (!showActive && status === "active") return false;
            if (!showUpcoming && status === "upcoming") return false;

            if (searchTerm) {
              const term = searchTerm.toLowerCase();
              return (
                (m.banco || "").toLowerCase().includes(term) ||
                (m.medioCobro || "").toLowerCase().includes(term) ||
                (m.medioPago || "").toLowerCase().includes(term)
              );
            }

            return true;
          });
        }, [methods, searchTerm, showActive, showUpcoming]);

        // Group by bank for easier reading
        const promotionsByBank = useMemo(() => {
          const grouped = {};
          filteredPromotions.forEach((p) => {
            const b = p.banco || "Otros";
            if (!grouped[b]) grouped[b] = [];
            grouped[b].push(p);
          });
          // Sort banks alphabetically
          return Object.keys(grouped)
            .sort()
            .reduce((acc, key) => {
              acc[key] = grouped[key];
              return acc;
            }, {});
        }, [filteredPromotions]);

        const diasSemanaNombres = [
          "Dom",
          "Lun",
          "Mar",
          "Mié",
          "Jue",
          "Vie",
          "Sáb",
        ];

        // --- Calendar Logic ---
        const [currentMonth, setCurrentMonth] = useState(() => {
          const now = new Date();
          return new Date(now.getFullYear(), now.getMonth(), 1);
        });

        const calendarDays = useMemo(() => {
          const year = currentMonth.getFullYear();
          const month = currentMonth.getMonth();
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const firstDayIndex = new Date(year, month, 1).getDay(); // 0 is Sunday

          const days = [];
          for (let i = 0; i < firstDayIndex; i++) {
            days.push(null); // empty slots for previous month
          }

          for (let i = 1; i <= daysInMonth; i++) {
            // pad with zero for YYYY-MM-DD
            const m = String(month + 1).padStart(2, "0");
            const d = String(i).padStart(2, "0");
            const dateStr = `${year}-${m}-${d}`;

            // Find promos that overlap with this date and are valid on this weekday
            const dateObj = new Date(year, month, i);
            const dayOfWeek = dateObj.getDay();

            const activePromos = methods.filter((promo) => {
              if (!promo.esPromocion) return false;

              const startDateValid =
                !promo.fecha_inicio || promo.fecha_inicio <= dateStr;
              const endDateValid =
                !promo.fecha_fin || promo.fecha_fin >= dateStr;
              const dayOfWeekValid = promo.dias_semana.includes(dayOfWeek);

              return startDateValid && endDateValid && dayOfWeekValid;
            });

            days.push({ day: i, dateStr, activePromos });
          }
          return days;
        }, [currentMonth, methods]);

        const nextMonth = () => {
          setCurrentMonth(
            new Date(
              currentMonth.getFullYear(),
              currentMonth.getMonth() + 1,
              1,

                                              </span>{" "}
                                              Base: {promo.comisionBase}%{" "}
                                              {promo.incluyeIVABase
                                                ? "(Inc. IVA)"
                                                : "(+ IVA)"}{" "}
                                              | Financ: {promo.comisionFinanc}%{" "}
                                              {promo.incluyeIVAFinanc
                                                ? "(Inc. IVA)"
                                                : "(+ IVA)"}
                                            </p>
                                            <p className="mt-1">
                                              <span className="font-medium text-gray-700">
                                                Plazo de acreditación:
                                              </span>{" "}
                                              {promo.diasAcreditacion} días
                                            </p>
                                            {promo.categoriaProducto && (
                                              <p className="mt-1">
                                                <span className="font-medium text-gray-700">
                                                  Categoría:
                                                </span>{" "}
                                                {promo.categoriaProducto}
                                              </p>
                                            )}
                                          </div>
                                          <div className="text-sm text-gray-600 bg-white p-3 rounded border border-gray-100">
                                            <p className="font-medium text-gray-700 mb-1">

                                            </p>
                                            <p className="italic">
                                              {promo.instrucciones ||
                                                "No hay instrucciones adicionales cargadas."}
                                            </p>
                                          </div>
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        ),
                      )}
                    </div>
                  )}
                </>
              )}

                <div className="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">

                  <div className="flex justify-between items-center p-4 bg-gray-50 border-b border-gray-200">
                    <button

                    >
                      <LucideIcon name="ChevronLeft" size={20} />
                    </button>
                    <h3 className="text-lg font-bold text-gray-800 capitalize">
                      {currentMonth.toLocaleDateString("es-AR", {

                    </h3>
                    <button
                      onClick={nextMonth}
                      className="p-2 text-gray-600 hover:text-purple-600 hover:bg-purple-50 rounded-full transition-colors"
                    >
                      <LucideIcon name="ChevronRight" size={20} />
                    </button>
                  </div>

                  {/* Calendar Grid */}
                  <div className="grid grid-cols-7 text-center text-xs sm:text-sm font-semibold text-gray-500 bg-gray-50 border-b border-gray-200">
                    {diasSemanaNombres.map((dia) => (
                      <div key={dia} className="py-2">
                        {dia}
                      </div>
                    ))}
                  </div>
                  <div className="grid grid-cols-7 gap-px bg-gray-200">
                    {calendarDays.map((dayData, idx) => (
                      <div
                        key={idx}
                        className={`min-h-[80px] sm:min-h-[120px] bg-white p-1 sm:p-2 flex flex-col ${!dayData ? "opacity-50 bg-gray-50" : ""}`}
                      >
                        {dayData && (
                          <>
                            <div className="text-right text-xs sm:text-sm font-medium text-gray-500 mb-1">
                              {dayData.day}
                            </div>
                            <div className="flex-grow flex flex-col gap-1 overflow-y-auto">
                              {dayData.activePromos.map((promo) => {
                                const isStart =
                                  promo.fecha_inicio === dayData.dateStr;

                                  promo.fecha_fin === dayData.dateStr;

      const App = () => {

        const [methods, setMethods] = useState([]);
        const [loading, setLoading] = useState(true);

        const processAndSetMethods = async (data, shouldSave = false) => {
          const parsed = data.map((m) => {
            const oldIncluyeIVA =
              m.incluyeIVA !== undefined ? m.incluyeIVA : false;
            const incluyeIVABase =
              m.incluyeIVABase !== undefined ? m.incluyeIVABase : oldIncluyeIVA;
            const incluyeIVAFinanc =
              m.incluyeIVAFinanc !== undefined
                ? m.incluyeIVAFinanc
                : oldIncluyeIVA;

            return {
              ...m,
              incluyeIVABase,
              incluyeIVAFinanc,
              fecha_inicio: m.fecha_inicio || "",
              fecha_fin: m.fecha_fin || "",
              dias_semana: m.dias_semana || [0, 1, 2, 3, 4, 5, 6],
              categoriaProducto: m.categoriaProducto || "",
              porcentaje_descuento_cliente: m.porcentaje_descuento_cliente || 0,
              tope_reintegro: m.tope_reintegro || 0,
              tipo_tope: m.tipo_tope || "por_transaccion",
              fecha_ultima_edicion:
                m.fecha_ultima_edicion || new Date().toISOString(),
              esPromocion: m.esPromocion || false,
              deletedAt: m.deletedAt || null,
              marketingNotes: m.marketingNotes || "",
              marketingImages: m.marketingImages || [],
            };
          });

          const now = new Date();
          const msPerDay = 1000 * 60 * 60 * 24;
          let changed = false;

          const purgedMethods = parsed.filter((m) => {
            if (m.deletedAt) {
              const deletedDate = new Date(m.deletedAt);
              const diffDays = Math.floor((now - deletedDate) / msPerDay);
              if (diffDays >= 7) {
                changed = true;
                return false;
              }
            }
            return true;
          });

          if (changed || shouldSave) {
            await saveMethods(purgedMethods);
          }
          setMethods(purgedMethods);
        };

        // Fetch data
        const fetchMethods = async () => {
          try {
            const docRef = db.collection("appData").doc("paymentMethods");
            const docSnap = await docRef.get();
            if (docSnap.exists) {
              const data = docSnap.data().methods || [];
              await processAndSetMethods(data);
            } else {
              setMethods(initialPaymentMethods);
            }
          } catch (error) {
            console.error("Error fetching from Firebase Firestore:", error);
            const localData = localStorage.getItem("appPaymentMethods");
            if (localData) {
              try {
                const parsedLocal = JSON.parse(localData);
                await processAndSetMethods(parsedLocal);
              } catch (e) {
                setMethods(initialPaymentMethods);
              }
            } else {
              setMethods(initialPaymentMethods);
            }
          } finally {
            setLoading(false);
          }
        };

        useEffect(() => {
          fetchMethods();
        }, []);

        const saveMethods = async (newMethods) => {
          try {
            localStorage.setItem(
              "appPaymentMethods",
              JSON.stringify(newMethods),
            );
          } catch (e) {
            console.error("Local storage full or inaccessible", e);
          }

          try {
            const docRef = db.collection("appData").doc("paymentMethods");
            await docRef.set({ methods: newMethods });
          } catch (error) {
            console.error(
              "Firebase Guardado falló. Los datos solo se guardaron localmente.",
              error,
            );
            throw error;
          }
        };

        // Custom setMethods wrapper to also save to server
        const updateMethods = (newMethods) => {
          setMethods(newMethods);
          saveMethods(newMethods).catch(() => {}); // Catch silent errors for normal operations
        };

        const handleForcePull = async () => {
          setLoading(true);
          await fetchMethods();
        };

        const handleForcePush = async () => {
          setLoading(true);
          try {
            await saveMethods(methods);
            alert("Datos guardados en el servidor exitosamente.");

            alert(
              "La aplicación está funcionando en modo local (ej. GitHub Pages). Tus datos se han guardado de forma segura en este navegador.\n\nPara verlos en otro dispositivo, usa el botón 'Exportar Copia de Seguridad' y cárgalos allí.",
            );

            setLoading(false);

          updateMethods([...methods, method]);

        const bulkAddMethods = (newMethods) => {
          updateMethods([...methods, ...newMethods]);

              return m.fecha_fin >= todayStr && m.fecha_fin <= nextWeekStr;
