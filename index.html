                {/* Nuevas Promos */}
                <div>
                  <h3 className="text-lg font-bold text-green-800 mb-4 flex items-center gap-2 border-b border-green-200 pb-2">
                    <LucideIcon
                      name="TrendingUp"
                      size={20}
                      className="text-green-600"
                    />
                    Promociones que inician (próximos 7 días)
                  </h3>

                  {nuevasPromos.length === 0 ? (
                    <div className="p-6 bg-gray-50 rounded-lg border border-gray-100 text-center text-gray-500 text-sm">
                      No hay promociones nuevas programadas para esta semana.
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {nuevasPromos.map((promo) => (
                        <div
                          key={promo.id}
                          className="p-3 bg-green-50 rounded-lg border border-green-100 flex justify-between items-start"
                        >
                          <div>
                            <div className="font-bold text-gray-900">
                              {promo.medioCobro}{" "}
                              <span className="text-sm font-normal text-gray-500">
                                ({promo.banco})
                              </span>
                            </div>
                            <div className="text-sm text-gray-600 mt-1">
                              {promo.porcentaje_descuento_cliente}% OFF -{" "}
                              {promo.cuotas} cuotas
                            </div>
                          </div>
                          <div className="text-right">
                            <span className="inline-block px-2 py-1 bg-green-200 text-green-800 text-xs font-bold rounded">
                              Inicia: {formatShortDate(promo.fecha_inicio)}
                            </span>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Promos por Vencer */}
                <div>
                  <h3 className="text-lg font-bold text-red-800 mb-4 flex items-center gap-2 border-b border-red-200 pb-2">
                    <LucideIcon
                      name="AlertCircle"
                      size={20}
                      className="text-red-600"
                    />
                    Promociones por vencer (próximos 7 días)
                  </h3>

                  {promosPorVencer.length === 0 ? (
                    <div className="p-6 bg-gray-50 rounded-lg border border-gray-100 text-center text-gray-500 text-sm">
                      No hay promociones próximas a vencer esta semana.
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {promosPorVencer.map((promo) => (
                        <div
                          key={promo.id}
                          className="p-3 bg-red-50 rounded-lg border border-red-100 flex justify-between items-start"
                        >
                          <div>
                            <div className="font-bold text-gray-900">
                              {promo.medioCobro}{" "}
                              <span className="text-sm font-normal text-gray-500">
                                ({promo.banco})
                              </span>
                            </div>
                            <div className="text-sm text-gray-600 mt-1">
                              {promo.porcentaje_descuento_cliente}% OFF -{" "}
                              {promo.cuotas} cuotas
                            </div>
                          </div>
                          <div className="text-right">
                            <span className="inline-block px-2 py-1 bg-red-200 text-red-800 text-xs font-bold rounded">
                              Vence: {formatShortDate(promo.fecha_fin)}
                            </span>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Promos Vencidas */}
                <div className="md:col-span-2 mt-4">
                  <h3 className="text-lg font-bold text-gray-500 mb-4 flex items-center gap-2 border-b border-gray-200 pb-2">
                    <LucideIcon
                      name="Archive"
                      size={20}
                      className="text-gray-400"
                    />
                    Promociones vencidas (últimos 7 días)
                  </h3>

                  {promosVencidas.length === 0 ? (
                    <div className="p-6 bg-white rounded-lg border border-gray-100 text-center text-gray-400 text-sm">
                      No hay promociones vencidas recientemente.
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {promosVencidas.map((promo) => (
                        <div
                          key={promo.id}
                          className="p-3 bg-gray-50 rounded-lg border border-gray-200 flex justify-between items-start opacity-75"
                        >
                          <div>
                            <div className="font-bold text-gray-700 line-through">
                              {promo.medioCobro}{" "}
                              <span className="text-sm font-normal text-gray-500">
                                ({promo.banco})
                              </span>
                            </div>
                            <div className="text-sm text-gray-500 mt-1">
                              {promo.porcentaje_descuento_cliente}% OFF -{" "}
                              {promo.cuotas} cuotas
                            </div>
                          </div>
                          <div className="text-right">
                            <span className="inline-block px-2 py-1 bg-gray-200 text-gray-600 text-xs font-bold rounded">
                              Venció: {formatShortDate(promo.fecha_fin)}
                            </span>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      };

      const MarketingView = ({ methods, onEdit }) => {
        const [searchTerm, setSearchTerm] = useState("");
        const [onlyPromos, setOnlyPromos] = useState(false);
        const [expandedCardId, setExpandedCardId] = useState(null);

        const filteredMethods = useMemo(() => {
          return methods.filter((m) => {
            if (onlyPromos && !m.esPromocion) return false;

            if (searchTerm) {
              const term = searchTerm.toLowerCase();
              return (
                (m.banco || "").toLowerCase().includes(term) ||
                (m.medioCobro || "").toLowerCase().includes(term) ||
                (m.medioPago || "").toLowerCase().includes(term)
              );
            }
            return true;
          });
        }, [methods, searchTerm, onlyPromos]);

        const handleNotesChange = (id, notes) => {
          const method = methods.find((m) => m.id === id);
          if (method) {
            onEdit({ ...method, marketingNotes: notes });
          }
        };

        const handleImageUpload = (id, e) => {
          const method = methods.find((m) => m.id === id);
          if (!method) return;

          const files = e.target.files;
          if (!files || files.length === 0) return;

          const reader = new FileReader();
          reader.onload = (event) => {
            const newImages = [
              ...(method.marketingImages || []),
              event.target.result,
            ];
            onEdit({ ...method, marketingImages: newImages });
          };
          reader.readAsDataURL(files[0]);
        };

        const handleDeleteImage = (methodId, imageIndex) => {
          const method = methods.find((m) => m.id === methodId);
          if (!method) return;

          if (confirm("¿Eliminar este flyer/imagen?")) {
            const newImages = [...method.marketingImages];
            newImages.splice(imageIndex, 1);
            onEdit({ ...method, marketingImages: newImages });
          }
        };

        return (
          <div className="max-w-4xl mx-auto p-4">
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
              <div className="flex items-center gap-3 mb-6">
                <div className="p-3 bg-pink-100 text-pink-600 rounded-lg">
                  <LucideIcon name="Megaphone" size={24} />
                </div>
                <h2 className="text-2xl font-bold text-gray-800">
                  Panel de Marketing
                </h2>
              </div>
              <p className="text-gray-600 mb-6">
                Revisá los medios de cobro disponibles, anotá ideas, planificá
                campañas y guardá flyers asociados a cada promoción. Esta
                información es privada para el equipo de marketing.
              </p>

              <div className="mb-8 p-4 bg-gray-50 rounded-lg border border-gray-200">
                <div className="flex flex-col sm:flex-row gap-4">
                  <div className="flex-grow">
                    <div className="relative">
                      <span className="absolute left-3 top-3 text-gray-400">
                        <LucideIcon name="Search" size={18} />
                      </span>
                      <input
                        type="text"
                        placeholder="Buscar por banco, billetera o medio de pago..."
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                        className="w-full pl-10 pr-4 py-2 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all outline-none"
                      />
                    </div>
                  </div>
                  <div className="flex items-center gap-4 bg-white px-4 py-2 rounded-lg border border-gray-300">
                    <label className="flex items-center space-x-2 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={onlyPromos}
                        onChange={(e) => setOnlyPromos(e.target.checked)}
                        className="w-4 h-4 text-pink-600 rounded border-pink-300 focus:ring-pink-500"
                      />
                      <span className="text-sm font-medium text-gray-700">
                        Solo Promociones Destacadas
                      </span>
                    </label>
                  </div>
                </div>
              </div>

              <div className="space-y-4">
                {filteredMethods.map((method) => {
                  const isExpanded = expandedCardId === method.id;
                  return (
                    <div
                      key={method.id}
                      className="bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm"
                    >
                      <div
                        className={`p-4 cursor-pointer flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 transition-colors ${isExpanded ? "bg-pink-50/30" : "hover:bg-gray-50"}`}
                        onClick={() =>
                          setExpandedCardId(isExpanded ? null : method.id)
                        }
                      >
                        <div>
                          <div className="flex items-center gap-2 mb-1">
                            <span className="font-bold text-lg text-gray-900">
                              {method.medioCobro}
                            </span>
                            <span className="text-sm text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full border border-gray-200">
                              {method.medioPago}
                            </span>
                            {method.esPromocion && (
                              <span className="text-xs font-semibold text-blue-700 bg-blue-100 px-2 py-0.5 rounded-full border border-blue-200">
                                Promo
                              </span>
                            )}
                          </div>
                          <div className="text-sm font-medium text-gray-600 flex items-center gap-3">
                            <span className="flex items-center gap-1">
                              <LucideIcon name="Landmark" size={14} />{" "}
                              {method.banco}
                            </span>
                            <span className="flex items-center gap-1">
                              <LucideIcon name="CreditCard" size={14} />{" "}
                              {method.cuotas} cuotas
                            </span>
                            {method.esPromocion &&
                              method.porcentaje_descuento_cliente > 0 && (
                                <span className="text-green-600 font-semibold flex items-center gap-1">
                                  <LucideIcon name="Tag" size={14} />{" "}
                                  {method.porcentaje_descuento_cliente}% OFF
                                </span>
                              )}
                          </div>
                          {method.esPromocion &&
                            (method.fecha_inicio || method.fecha_fin) && (
                              <div className="text-xs text-gray-500 mt-1 flex items-center gap-2">
                                <LucideIcon name="Calendar" size={12} />
                                {method.fecha_inicio
                                  ? new Date(
                                      method.fecha_inicio,
                                    ).toLocaleDateString()
                                  : "Siempre"}{" "}
                                -{" "}
                                {method.fecha_fin
                                  ? new Date(
                                      method.fecha_fin,
                                    ).toLocaleDateString()
                                  : "Sin fin"}
                                {method.tope_reintegro > 0 && (
                                  <span className="ml-2 border-l border-gray-300 pl-2">
                                    Tope: ${method.tope_reintegro} (
                                    {method.tipo_tope === "por_transaccion"
                                      ? "x Transacción"
                                      : "x Mes"}
                                    )
                                  </span>
                                )}
                              </div>
                            )}
                        </div>
                        <div className="flex items-center gap-4">
                          {method.marketingNotes && (
                            <span className="text-xs font-semibold text-pink-600 bg-pink-100 px-2 py-1 rounded flex items-center gap-1">
                              <LucideIcon name="FileText" size={12} /> Hay notas
                            </span>
                          )}
                          {(method.marketingImages || []).length > 0 && (
                            <span className="text-xs font-semibold text-pink-600 bg-pink-100 px-2 py-1 rounded flex items-center gap-1">
                              <LucideIcon name="Image" size={12} />{" "}
                              {(method.marketingImages || []).length} Flyer(s)
                            </span>
                          )}
                          <LucideIcon
                            name={isExpanded ? "ChevronUp" : "ChevronDown"}
                            size={20}
                            className="text-gray-400"
                          />
                        </div>
                      </div>

                      {isExpanded && (
                        <div className="p-4 bg-gray-50 border-t border-gray-200 animate-fadeIn">
                          {method.esPromocion && (
                            <div className="mb-4 grid grid-cols-1 md:grid-cols-2 gap-4 bg-white p-3 rounded border border-gray-200 shadow-sm text-sm text-gray-700">
                              <div>
                                <strong className="block text-gray-900 mb-1">
                                  Días de vigencia:
                                </strong>
                                {(method.dias_semana || []).length === 7
                                  ? "Todos los días"
                                  : (method.dias_semana || [])
                                      .map(
                                        (d) =>
                                          [
                                            "Dom",
                                            "Lun",
                                            "Mar",
                                            "Mié",
                                            "Jue",
                                            "Vie",
                                            "Sáb",
                                          ][d],
                                      )
                                      .join(", ")}
                              </div>
                              <div>
                                <strong className="block text-gray-900 mb-1">
                                  Comisiones:
                                </strong>
                                Base: {method.comisionBase}%{" "}
                                {method.incluyeIVABase
                                  ? "(Inc. IVA)"
                                  : "(+ IVA)"}{" "}
                                | Financiera: {method.comisionFinanc}%{" "}
                                {method.incluyeIVAFinanc
                                  ? "(Inc. IVA)"
                                  : "(+ IVA)"}
                              </div>
                              {method.instrucciones && (
                                <div className="md:col-span-2">
                                  <strong className="block text-gray-900 mb-1">
                                    Instrucciones:
                                  </strong>
                                  <p className="text-gray-600 bg-gray-50 p-2 rounded">
                                    {method.instrucciones}
                                  </p>
                                </div>
                              )}
                            </div>
                          )}
                          <div className="mb-4">
                            <label className="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                              <LucideIcon
                                name="PenTool"
                                size={16}
                                className="text-pink-500"
                              />
                              Notas de Campaña / Planificación
                            </label>
                            <textarea
                              className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 outline-none text-sm min-h-[100px]"
                              placeholder="Ej: Se publicitó en Instagram el 12/03. Renovar pauta si funciona bien..."
                              value={method.marketingNotes || ""}
                              onChange={(e) =>
                                handleNotesChange(method.id, e.target.value)
                              }
                            />
                            <p className="text-xs text-gray-400 mt-1">
                              Se guarda automáticamente.
                            </p>
                          </div>

                          <div>
                            <label className="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                              <LucideIcon
                                name="ImagePlus"
                                size={16}
                                className="text-pink-500"
                              />
                              Flyers y Material Gráfico
                            </label>

                            <div className="flex flex-wrap gap-4 mb-3">
                              {(method.marketingImages || []).map(
                                (imgSrc, idx) => (
                                  <div
                                    key={idx}
                                    className="relative group w-32 h-32 border border-gray-200 rounded bg-white shadow-sm flex items-center justify-center overflow-hidden"
                                  >
                                    <img
                                      src={imgSrc}
                                      alt="Flyer"
                                      className="max-w-full max-h-full object-contain"
                                    />
                                    <div className="absolute top-1 right-1 flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                      <button
                                        onClick={() =>
                                          handleDownloadImage(
                                            imgSrc,
                                            method.id,
                                            idx,
                                          )
                                        }
                                        className="bg-blue-500 text-white p-1 rounded-full shadow-sm hover:bg-blue-600"
                                        title="Descargar"
                                      >
                                        <LucideIcon name="Download" size={12} />
                                      </button>
                                      <button
                                        onClick={() =>
                                          handleDeleteImage(method.id, idx)
                                        }
                                        className="bg-red-500 text-white p-1 rounded-full shadow-sm hover:bg-red-600"
                                        title="Eliminar"
                                      >
                                        <LucideIcon name="Trash2" size={12} />
                                      </button>
                                    </div>
                                  </div>
                                ),
                              )}

                              <label className="w-32 h-32 border-2 border-dashed border-gray-300 rounded flex flex-col items-center justify-center text-gray-400 hover:text-pink-500 hover:border-pink-500 hover:bg-pink-50 transition-colors cursor-pointer">
                                <LucideIcon
                                  name="UploadCloud"
                                  size={24}
                                  className="mb-1"
                                />
                                <span className="text-xs font-medium">
                                  Subir imagen
                                </span>
                                <input
                                  type="file"
                                  accept="image/*"
                                  className="hidden"
                                  onChange={(e) =>
                                    handleImageUpload(method.id, e)
                                  }
                                />
                              </label>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                {filteredMethods.length === 0 && (
                  <div className="text-center py-10 text-gray-500 border-2 border-dashed border-gray-200 rounded-lg">
                    No se encontraron métodos de pago para marketing.
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
